services:
  - type: web
    name: unimetric-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm run serve
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: PORT
        value: 4000
      - key: USE_SUPABASE
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
